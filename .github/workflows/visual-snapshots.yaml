name: Visual Snapshots

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  snapshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git for private repos
        env:
          REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://x-access-token:${REPO_TOKEN}@github.com/".insteadOf "ssh://git@github.com/"
          mkdir -p ~/.cargo && echo -e '[net]\ngit-fetch-with-cli = true' >> ~/.cargo/config.toml

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.8
        with:
          pixi-version: v0.45.0

      - name: Build and generate snapshots
        run: pixi run vhs

      - name: Upload snapshots
        uses: actions/upload-artifact@v4
        with:
          name: visual-snapshots
          path: vhs/*.png

      - name: Post PR comment with snapshots
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Build comment body with links to artifacts
          ARTIFACT_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          BODY="## Visual Snapshots

          Generated CLI output screenshots from this PR.

          **[Download snapshots artifact]($ARTIFACT_URL)**

          | Screenshot | Command |
          |------------|---------|"

          for img in vhs/*.png; do
            name=$(basename "$img" .png)
            cmd=$(echo "$name" | sed 's/-/ /g')
            BODY="$BODY
          | $name | \`ana $cmd\` |"
          done

          BODY="$BODY

          ---
          *Generated by Visual Snapshots workflow at $(date -u +%Y-%m-%dT%H:%M:%SZ)*"

          # Find and update or create comment
          COMMENT_ID=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | contains("Visual Snapshots")) | .id' | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/comments/$COMMENT_ID" \
              -X PATCH \
              -f body="$BODY"
          else
            gh pr comment ${{ github.event.pull_request.number }} --body "$BODY"
          fi
