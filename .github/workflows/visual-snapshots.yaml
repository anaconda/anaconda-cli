name: Visual Snapshots

on:
  push:
    branches: [poc/snapshots]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  snapshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ github.head_ref }}

      - name: Configure git for private repos
        env:
          REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://x-access-token:${REPO_TOKEN}@github.com/".insteadOf "ssh://git@github.com/"
          mkdir -p ~/.cargo && echo -e '[net]\ngit-fetch-with-cli = true' >> ~/.cargo/config.toml

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.8
        with:
          pixi-version: v0.45.0

      - name: Build and generate snapshots
        run: pixi run vhs

      - name: Upload snapshots
        uses: actions/upload-artifact@v4
        with:
          name: visual-snapshots
          path: vhs/*.png

      - name: Commit snapshots to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f vhs/*.png
          git commit -m "chore: Update visual snapshots [skip ci]" || echo "No changes to commit"
          git push

      - name: Write job summary
        run: |
          echo "## Visual Snapshots" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for img in vhs/*.png; do
            name=$(basename "$img")
            url="https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/vhs/$name"
            echo "### $name" >> $GITHUB_STEP_SUMMARY
            echo "![$name]($url)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          done
