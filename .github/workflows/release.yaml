name: Release

permissions:
  contents: read  # To check out private repository

on:
  push:
    branches:
      - main
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml
    with:
      environment: ${{ github.event_name == 'release' && 'prod' || 'dev' }}
      skip-tests: ${{ github.event_name == 'push' }}
    secrets: inherit  # zizmor: ignore[secrets-inherit] reusable workflows must inherit environment secrets

  publish-to-anaconda-dot-org:
    name: Publish to Anaconda.org
    environment: anaconda-org-upload
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: packages
          pattern: conda-*
          merge-multiple: true

      - name: Upload to anaconda.org
        uses: anaconda/github-actions/upload-package@3d7b08cd24c1c5fc8a92a20caa9564bda187d7c1 # v0.2.1
        with:
          token: ${{ secrets.ANACONDA_ORG_UPLOAD_TOKEN }}
          owner: anaconda-cloud
          packages: packages/*/*.conda
          labels: ${{ github.event_name == 'release' && 'main' || 'dev' }}
          private: true
          force: true
          verbose: true

  create-github-release:
    name: Upload Binaries to GitHub Release
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      contents: write  # To create a release
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: binaries
          pattern: binary-*

      - name: Rename binaries
        run: |
          mkdir -p release-assets
          mv binaries/binary-ubuntu-latest/ana release-assets/ana-linux-x86_64
          mv binaries/binary-ubuntu-24.04-arm/ana release-assets/ana-linux-aarch64
          mv binaries/binary-macos-latest/ana release-assets/ana-darwin-arm64
          mv binaries/binary-windows-latest/ana.exe release-assets/ana-windows-x86_64.exe

      - name: Generate checksums
        run: |
          cd release-assets
          for file in *; do
            sha256sum "$file" > "${file}.sha256"
          done

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          echo "Uploading assets to existing release $VERSION"
          gh release upload "$VERSION" release-assets/* --clobber
          gh release upload "$VERSION" "${GITHUB_WORKSPACE}/scripts/install.sh"
          gh release upload "$VERSION" "${GITHUB_WORKSPACE}/scripts/install.ps1"

          echo "Publishing release $VERSION"
          gh release edit "$VERSION" --draft=false --latest
