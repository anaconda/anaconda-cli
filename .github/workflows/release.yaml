name: Release

permissions:
  contents: read

on:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  ci:
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yaml

  publish-to-anaconda-dot-org:
    name: Publish to Anaconda.org
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages
          pattern: conda-*
          merge-multiple: true

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4
        with:
          pixi-version: v0.66.0

      - name: Publish
        env:
          TOKEN: ${{ secrets.ANACONDA_ORG_UPLOAD_TOKEN }}
        run: |
          # Default to dev label, use main only for full releases (not prereleases)
          if [[ "${{ github.event_name }}" == "release" && "${{ github.event.release.prerelease }}" != "true" ]]; then
            export LABEL="main"
          else
            export LABEL="dev"
          fi

          echo "Publishing to label: $LABEL"

          pixi run anaconda --verbose \
            --token $TOKEN \
            upload \
            --user anaconda-cloud \
            --label $LABEL \
            --private \
            --force \
            packages/*/*.conda

  create-github-release:
    name: Upload Binaries to GitHub Release
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4
        with:
          pixi-version: v0.66.0

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ github.event.release.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(pixi run python scripts/with_version.py)
            echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries
          pattern: binary-*

      - name: Rename binaries
        run: |
          mkdir -p release-assets
          mv binaries/binary-ubuntu-latest/ana release-assets/ana-linux-x86_64
          mv binaries/binary-macos-latest/ana release-assets/ana-darwin-arm64
          mv binaries/binary-windows-latest/ana.exe release-assets/ana-windows-x86_64.exe

      - name: Create or update release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          generate_release_notes: ${{ github.event_name == 'push' }}
          files: release-assets/*
          append_body: ${{ github.event_name == 'push' }}
          body: |
            ---
            *Automated prerelease from main branch.*
