name: Release

permissions:
  contents: read

on:
  # TODO: Remove before merge
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - published

jobs:
  ci:
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yaml

  publish-to-anaconda-dot-org:
    name: Publish to Anaconda.org
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages
          pattern: conda-*
          merge-multiple: true

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4
        with:
          pixi-version: v0.66.0

      - name: Publish
        env:
          TOKEN: ${{ secrets.ANACONDA_ORG_UPLOAD_TOKEN }}
        run: |
          # Default to dev label, use main only for full releases (not prereleases)
          if [[ "${{ github.event_name }}" == "release" && "${{ github.event.release.prerelease }}" != "true" ]]; then
            export LABEL="main"
          else
            export LABEL="dev"
          fi

          echo "Publishing to label: $LABEL"

          pixi run anaconda --verbose \
            --token $TOKEN \
            upload \
            --user anaconda-cloud \
            --label $LABEL \
            --private \
            --force \
            packages/*/*.conda

  create-github-release:
    name: Create GitHub Release
    # TODO: Uncomment guard
    # if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.4
        with:
          pixi-version: v0.66.0

      - name: Get version
        id: version
        run: |
          VERSION=$(pixi run python scripts/with_version.py)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries
          pattern: binary-*

      - name: Rename binaries
        run: |
          mkdir -p release-assets
          mv binaries/binary-ubuntu-latest/ana release-assets/ana-linux-x86_64
          mv binaries/binary-macos-latest/ana release-assets/ana-darwin-arm64
          mv binaries/binary-windows-latest/ana.exe release-assets/ana-windows-x86_64.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          prerelease: true
          generate_release_notes: true
          files: release-assets/*
          append_body: true
          body: |
            ---
            *Automated prerelease from main branch.*
