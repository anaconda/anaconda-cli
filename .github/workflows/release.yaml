name: Release

permissions: {}

on:
  push:
    branches:
      - main
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml
    with:
      environment: ${{ github.event_name == 'release' && 'prod' || 'dev' }}
      skip-tests: ${{ github.event_name == 'push' }}
    secrets: inherit  # zizmor: ignore[secrets-inherit] reusable workflows must inherit environment secrets
    permissions:
      id-token: write  # Required for Azure OIDC authentication

  publish-to-anaconda-dot-org:
    name: Publish to Anaconda.org
    environment: anaconda-org-upload
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          sparse-checkout: .github/actions

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: packages
          pattern: conda-*
          merge-multiple: true

      - name: Upload to anaconda.org
        uses: ./.github/actions/upload-package
        with:
          token: ${{ secrets.ANACONDA_ORG_UPLOAD_TOKEN }}
          owner: anaconda-cloud
          packages: packages/*/*.conda
          labels: ${{ github.event_name == 'release' && 'main' || 'dev' }}
          private: 'true'
          force: 'true'
          verbose: 'true'

  create-github-release:
    name: Upload Binaries to GitHub Release
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      contents: write  # To create a release
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: binaries
          pattern: binary-*

      - name: Rename binaries
        run: |
          mkdir -p release-assets
          mv binaries/binary-ubuntu-latest/ana release-assets/ana-linux-x86_64
          mv binaries/binary-ubuntu-24.04-arm/ana release-assets/ana-linux-aarch64
          mv binaries/binary-macos-latest/ana release-assets/ana-darwin-arm64
          mv binaries/binary-windows-latest/ana.exe release-assets/ana-windows-x86_64.exe

      - name: Generate checksums
        run: |
          cd release-assets
          for file in *; do
            sha256sum "$file" > "${file}.sha256"
          done

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          echo "Uploading assets to existing release $VERSION"
          gh release upload "$VERSION" release-assets/* --clobber
          gh release upload "$VERSION" "${GITHUB_WORKSPACE}/scripts/install.sh"
          gh release upload "$VERSION" "${GITHUB_WORKSPACE}/scripts/install.ps1"

          echo "Publishing release $VERSION"
          gh release edit "$VERSION" --draft=false --latest

  deploy-to-anaconda-sh:
    name: Deploy to anaconda.sh
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    needs: [create-github-release]
    environment: prod
    steps:
      - name: Obtain token
        id: token
        uses: hashicorp/vault-action@892a26828f195e65540a40b4768ae4571f51ebfc # v4.0.0
        with:
          exportEnv: false
          extraHeaders: |
            CF-Access-Client-Id: ${{ secrets.CF_ANACONDA_CLI_CLIENT_ID }}
            CF-Access-Client-Secret: ${{ secrets.CF_ANACONDA_CLI_CLIENT_SECRET }}
          method: approle
          namespace: admin
          path: ${{ secrets.VAULT_ANACONDA_CLI_APPROLE_PATH }}
          roleId: ${{ secrets.VAULT_ANACONDA_CLI_APPROLE_ROLE_ID }}
          secretId: ${{ secrets.VAULT_ANACONDA_CLI_APPROLE_SECRET_ID }}
          url: ${{ secrets.EXT_VAULT_ADDR }}
          secrets: |
            anaconda-cli/prod/data/anaconda-sh/token pat | pat ;
            anaconda-cli/prod/data/anaconda-sh/workflow repo | repo ;
            anaconda-cli/prod/data/anaconda-sh/workflow workflow-id | workflow-id

      - name: Send deploy signal
        env:
          GH_TOKEN: ${{ steps.token.outputs.pat }}
          REPO: ${{ steps.token.outputs.repo }}
          WORKFLOW_ID: ${{ steps.token.outputs.workflow-id }}
        run: |
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${REPO}/actions/workflows/${WORKFLOW_ID}/dispatches" \
            -f "ref=main"
