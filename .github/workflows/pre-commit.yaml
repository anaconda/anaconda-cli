name: pre-commit

on:
  # Caches have a certain level of isolation, see https://docs.github.com/en/actions/using-workflows/caching-dependencies-to-speed-up-workflows#restrictions-for-accessing-a-cache
  # We run on push to main to have all caches in the main branch so that they can be reused for PRs.
  push:
    branches:
      - main
  merge_group:
  pull_request:

# Cancel a previous job if the same workflow is triggers on the same PR or commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions: {}

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          token: ${{ secrets.ANACONDA_BOT_TOKEN }}  # zizmor: ignore[secrets-outside-env]
          # Full history needed for SBOM freshness check (compares commit timestamps)
          fetch-depth: 0

      - name: Configure git for private repos
        env:
          REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}  # zizmor: ignore[secrets-outside-env]
        run: |
          git config --global url."https://x-access-token:${REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://x-access-token:${REPO_TOKEN}@github.com/".insteadOf "ssh://git@github.com/"
          mkdir -p ~/.cargo && echo -e '[net]\ngit-fetch-with-cli = true' >> ~/.cargo/config.toml

      - name: Set up ana with pixi
        uses: anaconda/actions/setup-anaconda-cli@a6f488910b4a1e4f3fe01736241ca1b92b4b355a # v0.3.1
        with:
          version: v0.1.6
          tools: pixi

      - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ runner.arch }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit and locks
        id: updates
        run: |
          pixi run pre-commit || :
          if git status --porcelain | grep -q .; then
            echo "changed=1" >> "${GITHUB_OUTPUT}"
          fi

      - name: Commit and fail if changes occurred
        if: steps.updates.outputs.changed == 1
        env:
          REF: ${{ github.head_ref }}
        run: |
          git fetch origin "refs/heads/${REF}:refs/remotes/origin/${REF}"
          git checkout "${REF}"

          git config user.name "Anaconda Bot"
          git config user.email "devops+anaconda-bot@anaconda.com"
          git add -u
          git commit -m "chore(pre-commit): Linting"
          git push

          echo "::error::Changes were committed. A new CI run will start."
          exit 1
