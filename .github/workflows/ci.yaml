name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  merge_group:
  workflow_call:
    secrets:
      PRIVATE_REPO_TOKEN:
        description: Token for accessing private repositories
        required: true
      SENTRY_DSN:
        description: Sentry DSN for error reporting (only for release builds)
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Configure git for private repos
        run: |
          git config --global url."https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
          mkdir -p ~/.cargo && echo -e '[net]\ngit-fetch-with-cli = true' >> ~/.cargo/config.toml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Hash SENTRY_DSN for cache key
        id: dsn-hash
        run: echo "hash=$(echo -n "$SENTRY_DSN" | shasum -a 256 | cut -c1-16)" >> "$GITHUB_OUTPUT"

      - name: Cache Cargo registry and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # Include a hash of SENTRY_DSN so cached artifacts are invalidated
          # when the DSN changes (build.rs embeds it at compile time).
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-dsn-${{ steps.dsn-hash.outputs.hash }}

      - name: Set up ana with pixi
        uses: anaconda/github-actions/setup-ana@feat/setup-ana
        with:
          tools: pixi
          github-token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Run unit tests
        run: pixi run test-release

      - name: Build release binary
        run: pixi run build-release

      - name: Run integration tests
        env:
          ANA_SENTRY_ENVIRONMENT: integration-test
          # Disable Sentry for pre-merge builds (PRs, merge queue) to avoid polluting error tracking
          ANA_SENTRY_DISABLED: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
        run: pixi run test-integration

      - name: Build conda package
        run: pixi run build-conda

      - name: Upload conda package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: conda-package-${{ matrix.os }}
          path: output/
          retention-days: 7

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ matrix.os }}
          path: target/release/ana${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          retention-days: 7

  check:
    name: Check
    if: always()
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether all jobs succeeded
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
