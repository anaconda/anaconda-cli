name: CI

on:
  pull_request:
  merge_group:
  workflow_call:
    inputs:
      skip-tests:
        description: Whether to skip tests
        type: boolean
        default: false
    secrets:
      PRIVATE_REPO_TOKEN:
        description: Token for accessing private repositories
        required: true
      SENTRY_DSN:
        description: Sentry DSN for error reporting (only for release builds)
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions: {}

jobs:
  # Non-Windows builds run everything in a single job
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    permissions:
      contents: read  # To check out private repository
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git for private repos
        env:
          REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://x-access-token:${REPO_TOKEN}@github.com/".insteadOf "ssh://git@github.com/"
          mkdir -p ~/.cargo && echo -e '[net]\ngit-fetch-with-cli = true' >> ~/.cargo/config.toml

      - name: Hash SENTRY_DSN for cache key
        id: dsn-hash
        run: echo "hash=$(echo -n "$SENTRY_DSN" | shasum -a 256 | cut -c1-16)" >> "$GITHUB_OUTPUT"

      - name: Cache Cargo registry and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # Include a hash of SENTRY_DSN so cached artifacts are invalidated
          # when the DSN changes (build.rs embeds it at compile time).
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-dsn-${{ steps.dsn-hash.outputs.hash }}

      - name: Set up ana with pixi
        if: matrix.os != 'ubuntu-24.04-arm'
        uses: anaconda/github-actions/setup-ana@fd7a6d41f5b751fe36e01155fd8eee7f1c51e598 # v0.2.0
        with:
          ana-version: v0.0.9
          tools: pixi
          github-token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Set up pixi (fallback)
        if: matrix.os == 'ubuntu-24.04-arm'
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e  # v0.9.4

      - name: Run unit tests
        if: ${{ !inputs.skip-tests }}
        env:
          RUST_BACKTRACE: 1
        run: pixi run test-release

      - name: Build release binary
        run: pixi run build-release

      - name: Run integration tests
        if: ${{ !inputs.skip-tests }}
        env:
          ANA_SENTRY_ENVIRONMENT: integration-test
          ANA_SENTRY_DISABLED: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
        run: pixi run test-integration

      - name: Build conda package
        run: pixi run build-conda

      - name: Upload conda package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: conda-package-${{ matrix.os }}
          path: output/
          retention-days: 7

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ matrix.os }}
          path: target/release/ana
          retention-days: 7

  # Windows: Build once, then run tests in parallel
  build-windows:
    name: Build (windows-latest)
    runs-on: windows-latest
    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    permissions:
      contents: read

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git for private repos
        env:
          REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://x-access-token:${REPO_TOKEN}@github.com/".insteadOf "ssh://git@github.com/"
          mkdir -p ~/.cargo && echo -e '[net]\ngit-fetch-with-cli = true' >> ~/.cargo/config.toml

      - name: Hash SENTRY_DSN for cache key
        id: dsn-hash
        run: echo "hash=$(echo -n "$SENTRY_DSN" | shasum -a 256 | cut -c1-16)" >> "$GITHUB_OUTPUT"

      - name: Cache Cargo registry and build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-Windows-${{ hashFiles('Cargo.lock') }}-dsn-${{ steps.dsn-hash.outputs.hash }}

      - name: Set up ana with pixi
        uses: anaconda/github-actions/setup-ana@fd7a6d41f5b751fe36e01155fd8eee7f1c51e598 # v0.2.0
        with:
          ana-version: v0.0.9
          tools: pixi
          github-token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Build release binary and compile tests
        run: |
          pixi run build-release
          pixi run -- cargo test --release --no-run

      - name: Build conda package
        run: pixi run build-conda

      - name: Upload conda package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: conda-package-windows-latest
          path: output/
          retention-days: 7

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-windows-latest
          path: target/release/ana.exe
          retention-days: 7

  test-windows-unit:
    name: Unit Tests (windows-latest)
    needs: build-windows
    if: ${{ !inputs.skip-tests }}
    runs-on: windows-latest
    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    permissions:
      contents: read

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git for private repos
        env:
          REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://x-access-token:${REPO_TOKEN}@github.com/".insteadOf "ssh://git@github.com/"
          mkdir -p ~/.cargo && echo -e '[net]\ngit-fetch-with-cli = true' >> ~/.cargo/config.toml

      - name: Hash SENTRY_DSN for cache key
        id: dsn-hash
        run: echo "hash=$(echo -n "$SENTRY_DSN" | shasum -a 256 | cut -c1-16)" >> "$GITHUB_OUTPUT"

      - name: Restore Cargo cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-Windows-${{ hashFiles('Cargo.lock') }}-dsn-${{ steps.dsn-hash.outputs.hash }}

      - name: Set up ana with pixi
        uses: anaconda/github-actions/setup-ana@fd7a6d41f5b751fe36e01155fd8eee7f1c51e598 # v0.2.0
        with:
          ana-version: v0.0.9
          tools: pixi
          github-token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Run unit tests
        env:
          RUST_BACKTRACE: 1
        run: pixi run test-release

  test-windows-integration:
    name: Integration Tests (windows-latest, ${{ matrix.shell }})
    needs: build-windows
    if: ${{ !inputs.skip-tests }}
    runs-on: windows-latest
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        shell: [bash, powershell]

    defaults:
      run:
        shell: ${{ matrix.shell == 'bash' && 'bash -el {0}' || 'powershell' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git for private repos (bash)
        if: matrix.shell == 'bash'
        env:
          REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://x-access-token:${REPO_TOKEN}@github.com/".insteadOf "ssh://git@github.com/"

      - name: Configure git for private repos (powershell)
        if: matrix.shell == 'powershell'
        env:
          REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          git config --global url."https://x-access-token:$env:REPO_TOKEN@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://x-access-token:$env:REPO_TOKEN@github.com/".insteadOf "ssh://git@github.com/"

      - name: Set up ana with pixi
        uses: anaconda/github-actions/setup-ana@fd7a6d41f5b751fe36e01155fd8eee7f1c51e598 # v0.2.0
        with:
          ana-version: v0.0.9
          tools: pixi
          github-token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Download binary
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: binary-windows-latest
          path: target/release/

      - name: Run integration tests
        env:
          ANA_SENTRY_ENVIRONMENT: integration-test
          ANA_SENTRY_DISABLED: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
        run: pixi run test-integration

  check:
    name: Check
    if: always()
    needs: [build, build-windows, test-windows-unit, test-windows-integration]
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether all jobs succeeded
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          allowed-skips: test-windows-unit, test-windows-integration
          jobs: ${{ toJSON(needs) }}
