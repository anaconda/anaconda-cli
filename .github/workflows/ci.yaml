name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  merge_group:
  workflow_call:
    secrets:
      PRIVATE_REPO_TOKEN:
        description: Token for accessing private repositories
        required: true
      SENTRY_DSN:
        description: Sentry DSN for error reporting (only for release builds)
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Configure git for private repos
        run: |
          git config --global url."https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
          mkdir -p ~/.cargo && echo -e '[net]\ngit-fetch-with-cli = true' >> ~/.cargo/config.toml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Hash SENTRY_DSN for cache key
        id: dsn-hash
        run: echo "hash=$(echo -n "$SENTRY_DSN" | shasum -a 256 | cut -c1-16)" >> "$GITHUB_OUTPUT"

      - name: Cache Cargo registry and build
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # Include a hash of SENTRY_DSN so cached artifacts are invalidated
          # when the DSN changes (build.rs embeds it at compile time).
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-dsn-${{ steps.dsn-hash.outputs.hash }}

      - name: Build binary
        run: cargo build --release

      - name: Set up ana
        run: |
          ANA="./ana${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
          cp "./target/release/ana${{ matrix.os == 'windows-latest' && '.exe' || '' }}" "$ANA"
          echo "ANA=$ANA" >> "$GITHUB_ENV"

          # TEMPORARY WORKAROUND: Pin the Rust toolchain paths so ana's
          # environment (which includes conda's cargo/rustc) doesn't shadow the
          # CI toolchain. Without this, cargo detects a different compiler and
          # rebuilds everything from scratch, defeating the build cache.
          # Remove this once the bootstrap binary is downloaded instead of built
          # from source — at that point, cargo build won't run in CI at all.
          echo "CARGO=$(which cargo)" >> "$GITHUB_ENV"
          echo "RUSTC=$(which rustc)" >> "$GITHUB_ENV"

          $ANA prepare

      - name: Run unit tests
        run: $ANA run test-release

      - name: Run integration tests
        env:
          ANA_SENTRY_ENVIRONMENT: integration-test
          # Disable Sentry for pre-merge builds (PRs, merge queue) to avoid polluting error tracking
          ANA_SENTRY_DISABLED: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
        run: $ANA run test-integration

      - name: Build conda package
        run: $ANA run build-conda

      - name: Upload conda package
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: conda-package-${{ matrix.os }}
          path: output/
          retention-days: 7

      - name: Upload binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: binary-${{ matrix.os }}
          path: target/release/ana${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          retention-days: 7

  check:
    name: Check
    if: always()
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether all jobs succeeded
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
