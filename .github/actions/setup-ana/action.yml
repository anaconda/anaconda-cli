name: Setup ana
description: Install the ana CLI and optional tools (pixi, conda, etc.)
author: Anaconda

branding:
  icon: package
  color: green

inputs:
  ana-version:
    description: Version of ana to install (e.g., "1.0.0" or "latest")
    required: false
    default: latest
  tools:
    description: Space or comma-separated list of tools to install (e.g., "pixi" or "pixi, conda")
    required: false
    default: ''
  github-token:
    description: GitHub token for accessing private repositories
    required: false
    default: ${{ github.token }}

outputs:
  ana-version:
    description: The version of ana that was installed
    value: ${{ steps.install-ana.outputs.version }}

runs:
  using: composite
  steps:
    - name: Install ana
      id: install-ana
      shell: bash
      env:
        ANA_VERSION: ${{ inputs.ana-version }}
        ANA_NO_PATH_UPDATE: '1'
        ANA_BOOTSTRAP: 'false'
        ANA_FORCE_INSTALL: '1'
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        # Download and run the install script (use GitHub API for private repo support)
        curl -fsSL \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3.raw" \
          "https://api.github.com/repos/anaconda/ana-cli/contents/scripts/install.sh?ref=$GITHUB_SHA" \
          | sh -s -- --token "$GITHUB_TOKEN" --version "v0.0.8.dev11"

        # Add ana to PATH for subsequent steps
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        echo "$HOME/.ana/bin" >> "$GITHUB_PATH"

        # Determine binary name (with .exe on Windows)
        ANA_BIN="$HOME/.local/bin/ana"
        if [[ "$(uname -s)" == MINGW* ]] || [[ "$(uname -s)" == MSYS* ]] || [[ "$(uname -s)" == CYGWIN* ]]; then
          ANA_BIN="$HOME/.local/bin/ana.exe"
        fi

        # Output the installed version
        VERSION=$("$ANA_BIN" --version | awk '{print $2}')
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Installed ana version: $VERSION"

    - name: Install tools
      if: inputs.tools != ''
      shell: bash
      env:
        TOOLS_INPUT: ${{ inputs.tools }}
      run: |
        # Add ana to PATH for this step (GITHUB_PATH only applies after composite action completes)
        export PATH="$HOME/.local/bin:$HOME/.ana/bin:$PATH"

        # Parse tools input (supports space or comma-separated)
        TOOLS=$(echo "$TOOLS_INPUT" | tr ',' ' ' | xargs)

        for tool in $TOOLS; do
          echo "Installing tool: $tool"
          ana tool install "$tool"
        done
