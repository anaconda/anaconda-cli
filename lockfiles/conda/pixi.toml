[workspace]
name = "conda"
channels = ["https://repo.anaconda.com/pkgs/main", "conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64", "win-64"]

[dependencies]
python = ">=3.12"
conda = ">=25.1"
conda-anaconda-telemetry = ">=0.3.0"
conda-anaconda-tos = ">=0.2.2"
conda-content-trust = "*"
conda-spawn = "*"
anaconda-anon-usage = "*"
anaconda-auth = "*"

# conda-forge only (not on repo.anaconda.com/pkgs/main)
conda-self = "*"
