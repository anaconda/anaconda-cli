[package]
name = "ana"
version = "0.0.0" # Placeholder - actual version derived from git tags via build.rs
edition = "2024"

[dependencies]
clap = { version = "4", features = ["derive"] }
comfy-table = "7"
indicatif = "0.18"
indoc = "2"
reqwest = { version = "0.13.2", features = ["blocking", "json", "native-tls"], default-features = false }
self-replace = "1.5"
semver = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anaconda-otel-rs = { git = "https://github.com/anaconda/anaconda-otel-rs" }

[dev-dependencies]
temp-env = "0.3"
