[package]
name = "ana"
version = "0.0.0" # Placeholder - actual version derived from git tags via build.rs
edition = "2024"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dependencies]
base64 = "0.22"
futures-util = "0.3"
dirs = "6"
clap = { version = "4", features = ["derive"] }
comfy-table = "7"
console = "0.16"
indicatif = "0.18"
indoc = "2"
reqwest = { version = "0.13.2", default-features = false, features = ["json", "native-tls", "stream", "multipart", "form"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "fs", "sync"] }
self-replace = "1.5"
semver = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anaconda-otel-rs = { git = "https://github.com/anaconda/anaconda-otel-rs" }
thiserror = "2"
webbrowser = "1"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }

[dev-dependencies]
temp-env = "0.3"
tempfile = "3"

# Force reqwest 0.12 (used by opentelemetry-otlp) to include TLS support
[dependencies.reqwest012]
package = "reqwest"
version = "0.12"
features = ["blocking", "native-tls"]
