[workspace]
name = "ana-cli"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64"]

[tasks]
pre-commit = "pre-commit run --verbose --show-diff-on-failure --color=always --all-files"

[dependencies]
pre-commit = ">=4.5.1,<5"

[environments]
build = ["build"]
dev = ["dev"]

[feature.build.dependencies]
rattler-build = ">=0.60.0,<0.61"

[feature.build.tasks]
build = "rattler-build build --recipe conda.recipe"

[feature.dev.dependencies]
rust = "*"

[feature.dev.tasks]
dev-build = "cargo build"
